<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя цифровая библиотека</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Шапка приложения -->
        <header>
            <h1>Моя цифровая библиотека</h1>
            <p>Управляйте вашей коллекцией книг</p>
        </header>

        <!-- Основной контейнер -->
        <main>
            <!-- Список книг -->
            <section id="list-section">
                <div id="book-list"></div>
            </section>

            <!-- Добавление книги -->
            <section id="form-section">
                <div id="book-form"></div>
            </section>

            <!-- Панель управления -->
            <section id="controls-section">
                <div id="controls"></div>
            </section>

            <!-- Статистика -->
            <section id="stats-section">
                <div id="statistics"></div>
            </section>

            <!-- Уведомления -->
            <section id="notifications-section">
                <div id="message-container"></div>
            </section>
        </main>

        <!-- Футер -->
        <footer>
            <p>© 2026 Цифровая библиотека | Всего книг: <span id="total-counter">0</span></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
