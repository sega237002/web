<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 id="gallery-title">Моя галерея</h1>
        <div id="controls">
            <button id="theme-toggle">Темная тема</button>
            <button id="zoom-in">Увеличить</button>
            <button id="zoom-out">Уменьшить</button>
            <button id="reset-styles">Сбросить стили</button>
        </div>
    </header>
    <main>
        <div class="gallery-container">
            <div class="image-box" id="image1">
                <img src="https://placehold.co/300x200/FF6B6B/FFFFFF?text=Изображение+1" alt="Изображение 1">
                <p class="image-description">Первое изображение</p>
                <button class="select-btn">Выбрать</button>
                <button class="hide-btn">Скрыть</button>
            </div>
            <div class="image-box" id="image2">
                <img src="https://placehold.co/300x200/4ECDC4/FFFFFF?text=Изображение+2" alt="Изображение 2">
                <p class="image-description">Второе изображение</p>
                <button class="select-btn">Выбрать</button>
                <button class="hide-btn">Скрыть</button>
            </div>
            <div class="image-box" id="image3">
                <img src="https://placehold.co/300x200/45B7D1/FFFFFF?text=Изображение+3" alt="Изображение 3">
                <p class="image-description">Третье изображение</p>
                <button class="select-btn">Выбрать</button>
                <button class="hide-btn">Скрыть</button>
            </div>
        </div>
        <div id="status-panel">
            <p id="selected-counter">Выбрано изображений: 0</p>
            <p id="hidden-counter">Скрыто изображений: 0</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
