<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Builder Workshop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="workshop-header">
        <h1>Attribute Builder Workshop</h1>
        <p>Интерактивный конструктор для изучения атрибутов DOM</p>
    </header>

    <main class="workshop-container">
        <!-- Левая панель: Блоки -->
        <section class="blocks-panel">
            <h2>Блоки</h2>
            <div class="blocks-container" id="blocks-container">
                <!-- 5 блоков будут созданы здесь из JS -->
            </div>
        </section>

        <!-- Центральная панель: Инструменты -->
        <section class="tools-panel">
            <h2>Инструменты</h2>
            <div class="tools-container" id="tools-container">
                <!-- 8 инструментов будут созданы здесь из JS -->
            </div>
            <div class="active-element-info">
                <h3>Активный блок: <span id="active-block-name">Не выбран</span></h3>
            </div>
        </section>

        <!-- Правая панель: Инспектор -->
        <section class="inspector-panel">
            <h2>Инспектор атрибутов</h2>
            <div class="attributes-list" id="attributes-list">
                <!-- Список атрибутов будет здесь -->
                <p class="placeholder">Выберите блок для просмотра</p>
            </div>
            <div class="action-log">
                <h3>Журнал действий</h3>
                <div id="action-log-content"></div>
            </div>
        </section>
    </main>

    <footer class="workshop-footer">
        <p>Используйте инструменты для управления атрибутами выбранного блока</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
